<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Car Rentals</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <div class="auth-bg auth-glow-1"></div>
    <div class="auth-bg auth-glow-2"></div>

    <section class="auth-page">
      <div class="auth-shell">
        <div class="auth-side">
          <a href="index.html" class="auth-logo">Car Rentals</a>
          <div class="auth-tag">Create account</div>
          <h1>Join now and start renting with style and ease.</h1>
          <p>
            Create your account to unlock bookings, order history, and saved
            details.
          </p>
        </div>

        <div class="auth-form-card">
          <form class="auth-form" id="signupForm">
            <div class="form-top">
              <h2>Create Account</h2>
              <p>Fill in your details to get started.</p>
            </div>

            <div class="input-box">
              <label for="fullName">Full Name</label>
              <input
                type="text"
                id="fullName"
                placeholder="Enter your full name"
                autocomplete="name"
                required
              />
            </div>

            <div class="input-box">
              <label for="email">Email Address</label>
              <input
                type="email"
                id="email"
                placeholder="Enter your email"
                autocomplete="email"
                required
              />
            </div>

            <div class="input-box">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                placeholder="Create a password"
                autocomplete="new-password"
                required
              />
            </div>

            <button class="btn auth-btn" type="submit">Sign Up</button>

            <p class="switch-text">
              Already have an account?
              <a href="login.html">Login</a>
            </p>
          </form>
        </div>
      </div>
    </section>

    <script src="config.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
