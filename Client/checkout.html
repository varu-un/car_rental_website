<!doctype html>
<html>
  <head>
    <title>Checkout</title>
    <link rel="stylesheet" href="checkout.css" />
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>

  <body>
    <header class="navbar">
      <div class="container">
        <h2 class="logo">Car Rentals</h2>
      </div>
    </header>

    <div class="container">
      <h2 class="page-title">Checkout</h2>

      <div class="checkout-grid">
        <!-- LEFT -->
        <form id="bookingForm" class="checkout-form">
          <h3>Your Details</h3>

          <input id="fullName" placeholder="Full Name" required />
          <input id="email" placeholder="Email" required />
          <input id="phone" placeholder="Phone" required />
          <input id="location" placeholder="Pickup Location" required />

          <label>Pickup Date</label>
          <input type="date" id="pickupDate" required />

          <label>Return Date</label>
          <input type="date" id="returnDate" required />

          <button class="btn-primary">Pay & Confirm Booking</button>
        </form>

        <!-- RIGHT -->
        <div class="checkout-summary">
          <h3>Order Summary</h3>

          <div id="summaryList"></div>

          <p id="daysInfo"></p>

          <div class="total-row">
            <span>Total</span>
            <span id="totalPrice">₹0</span>
          </div>
        </div>
      </div>
    </div>

    <script src="checkout.js"></script>
  </body>
</html>
