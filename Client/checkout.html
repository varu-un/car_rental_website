<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Car Rentals</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;500;700;800&display=swap"
      rel="stylesheet"
    />

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <link rel="stylesheet" href="checkout.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="container nav-flex">
        <a href="index.html" class="logo">Car Rentals</a>

        <a href="index.html" class="home-btn">
          <span class="home-icon">⌂</span>
          <span>Home</span>
        </a>
      </div>
    </header>

    <main class="checkout-page">
      <div class="container">
        <div class="page-heading">
          <p class="eyebrow">Secure Booking</p>
          <h1 class="page-title">Checkout</h1>
          <p class="page-subtitle">
            Complete your booking with your details, rental dates, and secure
            payment.
          </p>
        </div>

        <div class="checkout-grid">
          <section class="checkout-form-card">
            <div class="card-header">
              <h2>Your Details</h2>
              <p>Fill in the information below to confirm your rental.</p>
            </div>

            <form id="bookingForm" class="checkout-form">
              <div class="input-group">
                <label for="fullName">Full Name</label>
                <input
                  type="text"
                  id="fullName"
                  placeholder="Enter your full name"
                  required
                />
              </div>

              <div class="input-group">
                <label for="email">Email</label>
                <input
                  type="email"
                  id="email"
                  placeholder="Enter your email"
                  required
                />
              </div>

              <div class="input-group">
                <label for="phone">Phone</label>
                <input
                  type="tel"
                  id="phone"
                  placeholder="Enter your phone number"
                  required
                />
              </div>

              <div class="input-group">
                <label for="location">Pickup Location</label>
                <input
                  type="text"
                  id="location"
                  placeholder="Enter pickup location"
                  required
                />
              </div>

              <div class="date-grid">
                <div class="input-group">
                  <label for="pickupDate">Pickup Date</label>
                  <input type="date" id="pickupDate" required />
                </div>

                <div class="input-group">
                  <label for="returnDate">Return Date</label>
                  <input type="date" id="returnDate" required />
                </div>
              </div>

              <div class="payment-method-group">
                <label>Payment Method</label>
                <div class="payment-methods">
                  <label class="payment-option">
                    <input type="radio" name="paymentMethod" value="upi" />
                    <span class="method-label">UPI</span>
                    <span class="method-desc">Pay using UPI ID</span>
                  </label>
                  <label class="payment-option">
                    <input
                      type="radio"
                      name="paymentMethod"
                      value="card"
                      checked
                    />
                    <span class="method-label">Card/Wallet</span>
                    <span class="method-desc"
                      >Credit/Debit Card, Wallets & More</span
                    >
                  </label>
                </div>
              </div>

              <button type="submit" class="btn-primary">
                Pay & Confirm Booking
              </button>
            </form>
          </section>

          <aside class="checkout-summary-card">
            <div class="card-header">
              <h2>Order Summary</h2>
              <p>Review your selected cars and estimated rental total.</p>
            </div>

            <div id="summaryList" class="summary-list"></div>

            <div class="summary-footer">
              <p id="daysInfo" class="days-info">Select valid dates</p>

              <div class="total-row">
                <span>Total</span>
                <span id="totalPrice">₹0.00</span>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </main>

    <script src="config.js"></script>
    <script src="checkout.js"></script>
  </body>
</html>
