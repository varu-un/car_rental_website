<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Car Rentals</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <div class="auth-bg auth-glow-1"></div>
    <div class="auth-bg auth-glow-2"></div>

    <section class="auth-page">
      <div class="auth-shell">
        <div class="auth-side">
          <a href="index.html" class="auth-logo">Car Rentals</a>
          <div class="auth-tag">Welcome back</div>
          <h1>Sign in to continue your rental journey.</h1>
          <p>Access your bookings, addresses, and saved payment options.</p>
        </div>

        <div class="auth-form-card">
          <form class="auth-form" id="loginForm">
            <div class="form-top">
              <h2>Login</h2>
              <p>Enter your account details.</p>
            </div>

            <div class="input-box">
              <label for="loginEmail">Email Address</label>
              <input
                type="email"
                id="loginEmail"
                placeholder="Enter your email"
                autocomplete="email"
                required
              />
            </div>

            <div class="input-box">
              <label for="loginPassword">Password</label>
              <input
                type="password"
                id="loginPassword"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              />
            </div>

            <button class="btn auth-btn" type="submit">Login</button>

            <p class="switch-text">
              Don't have an account?
              <a href="signup.html">Create one</a>
            </p>
          </form>
        </div>
      </div>
    </section>

    <script src="config.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
