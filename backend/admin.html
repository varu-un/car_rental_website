<!doctype html>
<html>
  <head>
    <title>Admin Panel</title>
  </head>

  <body>
    <h2>All Bookings</h2>

    <table border="1" id="table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Amount</th>
          <th>Payment ID</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      fetch("http://localhost:5000/bookings")
        .then((res) => res.json())
        .then((data) => {
          const tbody = document.querySelector("tbody");

          data.forEach((b) => {
            const row = `
        <tr>
          <td>${b.name}</td>
          <td>${b.email}</td>
          <td>₹${b.amount}</td>
          <td>${b.paymentId}</td>
          <td>${new Date(b.date).toLocaleString()}</td>
        </tr>
      `;
            tbody.innerHTML += row;
          });
        });
    </script>
  </body>
</html>
